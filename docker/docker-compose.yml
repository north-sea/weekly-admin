version: '3.8'

services:
  app:
    image: ${DOCKER_REGISTRY:-}weekly-content-management:${APP_VERSION:-latest}
    container_name: weekly-content-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    env_file:
      - .env
    networks:
      - weekly-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
