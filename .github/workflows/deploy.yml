name: Build and Deploy to NAS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, only deploy existing image'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version
        id: version
        run: |
          VERSION=$(date +%Y%m%d)-$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            DATABASE_URL=mysql://temp:temp@localhost:3306/temp

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || github.event.inputs.deploy_only == 'true')

    steps:
      - name: Deploy to NAS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.NAS_HOST }}
          username: ${{ secrets.NAS_USERNAME }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_SSH_PORT || 22 }}
          script: |
            # 配置
            CONTAINER_NAME="weekly-admin"
            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            DEPLOY_DIR="${{ secrets.NAS_DEPLOY_DIR || '/volume1/docker/weekly-admin' }}"

            echo "🚀 开始部署 Weekly Admin..."
            echo "📦 镜像: $IMAGE"

            # 登录 GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            echo "📥 拉取最新镜像..."
            docker pull $IMAGE

            # 停止并删除旧容器
            echo "🛑 停止旧容器..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # 启动新容器
            echo "🚀 启动新容器..."
            cd $DEPLOY_DIR

            # 使用 docker-compose 或直接 docker run
            if [ -f "docker-compose.yml" ]; then
              docker compose pull
              docker compose up -d
            else
              docker run -d \
                --name $CONTAINER_NAME \
                --restart unless-stopped \
                --env-file .env \
                -p 3000:3000 \
                --network bridge \
                $IMAGE
            fi

            # 等待容器启动
            echo "⏳ 等待容器启动..."
            sleep 10

            # 健康检查
            echo "🔍 执行健康检查..."
            for i in {1..6}; do
              if curl -sf http://localhost:3000/api/health > /dev/null; then
                echo "✅ 部署成功！应用已启动"
                docker ps | grep $CONTAINER_NAME
                exit 0
              fi
              echo "等待应用启动... ($i/6)"
              sleep 10
            done

            echo "❌ 健康检查失败"
            docker logs --tail 50 $CONTAINER_NAME
            exit 1

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ 部署成功"
          else
            echo "❌ 部署失败"
          fi
